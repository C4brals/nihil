<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihil - A Última Campanha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./assets/ico.png" sizes="32x32">

    <link rel="icon" type="image/png" href="./assets/ico-grande.png" sizes="192x192">

    <link rel="apple-touch-icon" href="./assets/ico-ios.png">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #050505;
            color: #dcd0c0;
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.95)), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .moldura-tela {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 2px solid #4a0000;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(139, 0, 0, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .moldura-tela::before, .moldura-tela::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #c5a059;
        }
        .moldura-tela::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .moldura-tela::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        .painel-container {
            z-index: 2;
            max-width: 1200px;
            width: 90%;
            margin-top: 40px;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .titulo-painel {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #8b0000;
            text-shadow: 0 0 15px rgba(139, 0, 0, 0.5), 2px 2px 4px #000;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 4px;
        }

        .subtitulo-painel {
            font-family: 'Cinzel', serif;
            color: #c5a059;
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px #000;
        }

        .tag-modo {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #bfae96;
        }
        .tag-modo span {
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: bold;
        }
        .modo-mestre { background: rgba(139, 0, 0, 0.3); border: 1px solid #8b0000; color: #ffcccc; }
        .modo-jogador { background: rgba(197, 160, 89, 0.15); border: 1px solid #c5a059; color: #fff; }

        .grid-fichas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .ficha-card {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(197, 160, 89, 0.15);
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            position: relative;
            transition: border-color 0.4s ease;
        }

        .ficha-card.corrompido-status {
            border-color: #8b0000;
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.3);
        }

        .ficha-header {
            display: flex;
            flex-direction: column; /* Empilha o nome acima dos atributos */
            align-items: flex-start; /* Alinha tudo à esquerda */
            border-bottom: 1px solid #4a0000;
            padding-bottom: 12px;
            margin-bottom: 15px;
            gap: 12px; /* Espaço elegante entre o nome e a linha de atributos */
        }

        .ficha-nome {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem; /* Aumentado levemente para dar mais destaque */
            color: #bfae96;
            background: transparent;
            border: none;
            width: 100%; /* Agora o nome ocupa toda a largura do card! */
            padding-bottom: 4px;
        }

        .ficha-nome:focus {
            outline: none;
            color: #ffffff;
            border-bottom: 1px dashed #c5a059;
        }

        .ficha-nome:read-only {
            cursor: default;
            border-bottom: none !important;
        }

        /* Container de Atributos (PV e AM lado a lado) */
        .atributos-header-container {
            display: flex;
            gap: 8px;
            flex-shrink: 0; /* Impede que o container encolha, protegendo o tamanho do PV/AM */
        }

        .pv-container, .am-container {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(4, 4, 4, 0.6);
            padding: 5px 8px;
            border: 1px solid rgba(139, 0, 0, 0.4);
        }

        .am-container {
            border: 1px solid rgba(197, 160, 89, 0.4); /* Borda dourada para moedas */
        }

        .pv-label {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: #8b0000;
            font-weight: bold;
        }

        .am-label {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: #c5a059;
            font-weight: bold;
        }

        .pv-valor, .am-valor {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #dcd0c0;
            min-width: 20px;
            text-align: center;
        }

        .am-valor {
            min-width: 32px; /* Garante espaço estável para até 3 dígitos */
        }

        .pv-btn, .am-btn {
            background: transparent;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: #c5a059;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .pv-btn:hover {
            background: #4a0000;
            color: #fff;
            border-color: #8b0000;
        }

        .am-btn:hover {
            background: #c5a059;
            color: #050505;
            border-color: #fff;
        }

        .status-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-select {
            background: #0a0a0a;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: #dcd0c0;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            padding: 4px 8px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .status-select.status-corrompido {
            color: #ff3333;
            border-color: #8b0000;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .status-select:disabled {
            opacity: 1;
            cursor: default;
            border-color: transparent;
            background: transparent;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
        }

        .campo-texto {
            margin-bottom: 12px;
        }

        .campo-texto label {
            font-family: 'Cinzel', serif;
            color: #c5a059;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        textarea {
            width: 100%;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(197, 160, 89, 0.2);
            color: #dcd0c0;
            padding: 8px;
            font-family: 'Lora', serif;
            font-size: 0.9rem;
            border-radius: 2px;
            resize: vertical;
            min-height: 60px;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #8b0000;
            background-color: rgba(30, 10, 10, 0.3);
        }

        textarea:read-only {
            background-color: rgba(15, 15, 15, 0.4);
            border-color: rgba(197, 160, 89, 0.05);
            resize: none;
            cursor: default;
        }

        .botoes-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .botao-menu {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #bfae96;
            text-decoration: none;
            background: linear-gradient(to right, transparent, rgba(26, 0, 0, 0.4), transparent);
            padding: 12px 60px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            transition: all 0.4s ease;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .botao-menu:hover {
            color: #ffffff;
            border-color: #8b0000;
            background: linear-gradient(to right, rgba(139, 0, 0, 0.2), rgba(74, 0, 0, 0.6), rgba(139, 0, 0, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="moldura-tela"></div>

    <div class="painel-container">
        <h1 class="titulo-painel">Painel de Campanha</h1>
        <p class="subtitulo-painel">— O destino dos heróis de Hémoras —</p>
        
        <div class="tag-modo" id="tagModo">Visão: <span>Carregando...</span></div>
        
        <div class="grid-fichas" id="gridFichas"></div>

        <div class="botoes-container">
            <a href="./index.html" class="botao-menu">Voltar ao Menu</a>
        </div>
    </div>

    <script>
        const TOTAL_FICHAS = 10;
        const CHAVE_STORAGE = 'nihil_painel_campanha';

        // --- CONFIGURAÇÃO DE SEGURANÇA ---
        const SENHA_MESTRE = "232823"; 
        // ----------------------------------

        const urlParams = new URLSearchParams(window.location.search);
        let modoSolicitado = urlParams.get('modo');
        let modoAcesso = 'jogador'; 

        if (modoSolicitado === 'mestre') {
            let autenticado = false;

            while (!autenticado) {
                let tentativaSenha = prompt("Digite a palavra-passe do Mestre para obter direito de alteração:\n(Ou clique em Cancelar para voltar ao menu)");

                if (tentativaSenha === null) {
                    window.location.href = "./index.html"; 
                    break; 
                }

                if (tentativaSenha === SENHA_MESTRE) {
                    modoAcesso = 'mestre';
                    autenticado = true;
                } else {
                    alert("Senha inválida! Tente novamente.");
                }
            }
        } else {
            modoAcesso = 'jogador';
        }

        function criarFichaPadrao(index) {
            return {
                nome: `Herói ${index}`,
                pv: 5,
                am: 0, // Adicionado contador de Artifício da Mácula por padrão
                status: 'Normal',
                inventario: '',
                historico: ''
            };
        }

        function obterDadosGerais() {
            const dadosSalvos = localStorage.getItem(CHAVE_STORAGE);
            if (dadosSalvos) {
                const dadosConvertidos = JSON.parse(dadosSalvos);
                // Tratamento caso a estrutura antiga no localStorage não possua o campo 'am'
                return dadosConvertidos.map((ficha, idx) => {
                    if (ficha.am === undefined) ficha.am = 0;
                    return ficha;
                });
            } else {
                const listaNova = [];
                for(let i = 1; i <= TOTAL_FICHAS; i++) {
                    listaNova.push(criarFichaPadrao(i));
                }
                return listaNova;
            }
        }

        function salvarDadosGerais(dados) {
            if (modoAcesso !== 'mestre') return; 
            localStorage.setItem(CHAVE_STORAGE, JSON.stringify(dados));
        }

        function atualizarCampo(index, campo, valor) {
            if (modoAcesso !== 'mestre') return;
            const dados = obterDadosGerais();
            dados[index][campo] = valor;
            salvarDadosGerais(dados);

            if (campo === 'status') {
                const card = document.getElementById(`card-${index}`);
                const selectElement = document.getElementById(`status-${index}`);
                
                if (valor === 'Corrompido') {
                    card.classList.add('corrompido-status');
                    selectElement.classList.add('status-corrompido');
                } else {
                    card.classList.remove('corrompido-status');
                    selectElement.classList.remove('status-corrompido');
                }
            }
        }

        function alterarPV(index, quantidade) {
            if (modoAcesso !== 'mestre') return;
            const dados = obterDadosGerais();
            let novoPV = parseInt(dados[index].pv) + quantidade;
            
            if (novoPV < 0) novoPV = 0; 
            
            dados[index].pv = novoPV;
            salvarDadosGerais(dados);
            
            document.getElementById(`pv-val-${index}`).innerText = novoPV;
        }

        // Função para alteração do Artifício da Mácula (Limites de 0 a 999)
        function alterarAM(index, quantidade) {
            if (modoAcesso !== 'mestre') return;
            const dados = obterDadosGerais();
            let novoAM = parseInt(dados[index].am || 0) + quantidade;
            
            if (novoAM < 0) novoAM = 0; 
            if (novoAM > 999) novoAM = 999; // Limita a 3 casas decimais
            
            dados[index].am = novoAM;
            salvarDadosGerais(dados);
            
            document.getElementById(`am-val-${index}`).innerText = novoAM;
        }

        function renderizarPainel() {
            const tagModo = document.getElementById('tagModo');
            if (modoAcesso === 'mestre') {
                tagModo.innerHTML = 'Modo Atual: <span class="modo-mestre">Mestre da Campanha</span>';
            } else {
                tagModo.innerHTML = 'Modo Atual: <span class="modo-jogador">Visualização</span>';
            }

            const dados = obterDadosGerais();
            const grid = document.getElementById('gridFichas');
            grid.innerHTML = ''; 

            const isMestre = (modoAcesso === 'mestre');

            dados.forEach((ficha, index) => {
                const isCorrompido = ficha.status === 'Corrompido';
                
                // Elementos de Vida adaptáveis
                const botoesVida = isMestre ? `
                    <button type="button" class="pv-btn" onclick="alterarPV(${index}, -1)">-</button>
                    <span class="pv-valor" id="pv-val-${index}">${ficha.pv}</span>
                    <button type="button" class="pv-btn" onclick="alterarPV(${index}, 1)">+</button>
                ` : `
                    <span class="pv-valor" id="pv-val-${index}" style="margin: 0 4px;">${ficha.pv}</span>
                `;

                // Elementos da Moeda AM adaptáveis
                const botoesAM = isMestre ? `
                    <button type="button" class="am-btn" onclick="alterarAM(${index}, -1)">-</button>
                    <span class="am-valor" id="am-val-${index}">${ficha.am}</span>
                    <button type="button" class="am-btn" onclick="alterarAM(${index}, 1)">+</button>
                ` : `
                    <span class="am-valor" id="am-val-${index}" style="margin: 0 4px;">${ficha.am}</span>
                `;

                const cardHTML = `
                    <div class="ficha-card ${isCorrompido ? 'corrompido-status' : ''}" id="card-${index}">
                        <div class="ficha-header">
                            <input type="text" class="ficha-nome" value="${ficha.nome}" 
                                ${!isMestre ? 'readonly' : ''}
                                onchange="atualizarCampo(${index}, 'nome', this.value)" placeholder="Nome do Herói">
                            
                            <div class="atributos-header-container">
                                <div class="pv-container">
                                    <span class="pv-label">PV</span>
                                    ${botoesVida}
                                </div>
                                <div class="am-container" title="Artifício da Mácula">
                                    <span class="am-label">AM</span>
                                    ${botoesAM}
                                </div>
                            </div>
                        </div>

                        <div class="status-container">
                            <label style="font-family: 'Cinzel'; font-size: 0.8rem; color: #bfae96;">Estado:</label>
                            <select id="status-${index}" class="status-select ${isCorrompido ? 'status-corrompido' : ''}" 
                                ${!isMestre ? 'disabled' : ''}
                                onchange="atualizarCampo(${index}, 'status', this.value)">
                                <option value="Normal" ${ficha.status === 'Normal' ? 'selected' : ''}>Normal</option>
                                <option value="Corrompido" ${ficha.status === 'Corrompido' ? 'selected' : ''}>Corrompido</option>
                            </select>
                        </div>

                        <div class="campo-texto">
                            <label>Inventário</label>
                            <textarea ${!isMestre ? 'readonly' : ''} 
                                onchange="atualizarCampo(${index}, 'inventario', this.value)" 
                                placeholder="${isMestre ? 'Itens, armas, relíquias...' : 'Nenhum item carregado.'}">${ficha.inventario}</textarea>
                        </div>

                        <div class="campo-texto">
                            <label>Histórico da Campanha</label>
                            <textarea ${!isMestre ? 'readonly' : ''} 
                                onchange="atualizarCampo(${index}, 'historico', this.value)" 
                                placeholder="${isMestre ? 'Notas do mestre, cicatrizes mentais...' : 'Nenhum histórico registrado.'}">${ficha.historico}</textarea>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        window.onload = renderizarPainel;
    </script>
</body>
</html>
