<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihil - Painel de Heróis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #050505;
            color: #dcd0c0;
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.95)), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Moldura Medieval Sombria fixa */
        .moldura-tela {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 2px solid #4a0000;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(139, 0, 0, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .moldura-tela::before, .moldura-tela::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #c5a059;
        }
        .moldura-tela::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .moldura-tela::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        /* Container Principal */
        .painel-container {
            z-index: 2;
            max-width: 1200px;
            width: 90%;
            margin-top: 40px;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .titulo-painel {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #8b0000;
            text-shadow: 0 0 15px rgba(139, 0, 0, 0.5), 2px 2px 4px #000;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 4px;
        }

        .subtitulo-painel {
            font-family: 'Cinzel', serif;
            color: #c5a059;
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px #000;
        }

        /* Grid das Fichas */
        .grid-fichas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Cartão de cada Ficha */
        .ficha-card {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(197, 160, 89, 0.15);
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            position: relative;
            transition: border-color 0.4s ease;
        }

        /* Se a ficha estiver corrompida muda a borda do card */
        .ficha-card.corrompido-status {
            border-color: #8b0000;
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.3);
        }

        .ficha-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4a0000;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .ficha-nome {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #bfae96;
            background: transparent;
            border: none;
            width: 60%;
        }

        .ficha-nome:focus {
            outline: none;
            color: #ffffff;
            border-bottom: 1px dashed #c5a059;
        }

        /* Mecânica de PV (Vida) */
        .pv-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(4, 4, 4, 0.6);
            padding: 5px 10px;
            border: 1px solid rgba(139, 0, 0, 0.4);
        }

        .pv-label {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: #8b0000;
            font-weight: bold;
        }

        .pv-valor {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #dcd0c0;
            min-width: 25px;
            text-align: center;
        }

        .pv-btn {
            background: transparent;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: #c5a059;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .pv-btn:hover {
            background: #4a0000;
            color: #fff;
            border-color: #8b0000;
        }

        /* Seção do Status (TAG) */
        .status-container {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-select {
            background: #0a0a0a;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: #dcd0c0;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            padding: 4px 8px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .status-select.status-corrompido {
            color: #ff3333;
            border-color: #8b0000;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        /* Campos de Texto */
        .campo-texto {
            margin-bottom: 12px;
        }

        .campo-texto label {
            font-family: 'Cinzel', serif;
            color: #c5a059;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        textarea {
            width: 100%;
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(197, 160, 89, 0.2);
            color: #dcd0c0;
            padding: 8px;
            font-family: 'Lora', serif;
            font-size: 0.9rem;
            border-radius: 2px;
            resize: vertical;
            min-height: 60px;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #8b0000;
            background-color: rgba(30, 10, 10, 0.3);
        }

        /* Botão de Voltar */
        .botoes-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .botao-menu {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #bfae96;
            text-decoration: none;
            background: linear-gradient(to right, transparent, rgba(26, 0, 0, 0.4), transparent);
            padding: 12px 60px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            transition: all 0.4s ease;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .botao-menu:hover {
            color: #ffffff;
            border-color: #8b0000;
            background: linear-gradient(to right, rgba(139, 0, 0, 0.2), rgba(74, 0, 0, 0.6), rgba(139, 0, 0, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="moldura-tela"></div>

    <div class="painel-container">
        <h1 class="titulo-painel">Painel de Campanha</h1>
        <p class="subtitulo-painel">— O destino dos heróis de Hémoras —</p>
        
        <!-- Onde as 10 fichas serão geradas pelo JavaScript -->
        <div class="grid-fichas" id="gridFichas"></div>

        <div class="botoes-container">
            <a href="./index.html" class="botao-menu">Retornar ao Menu</a>
        </div>
    </div>

    <script>
        const TOTAL_FICHAS = 10;
        const CHAVE_STORAGE = 'nihil_painel_campanha';

        // Estrutura inicial padrão para uma ficha vazia
        function criarFichaPadrao(index) {
            return {
                nome: `Herói ${index}`,
                pv: 5,
                status: 'Normal',
                inventario: '',
                historico: ''
            };
        }

        // Carrega os dados ou cria uma lista com 10 fichas limpas
        function obterDadosGerais() {
            const dadosSalvos = localStorage.getItem(CHAVE_STORAGE);
            if (dadosSalvos) {
                return JSON.parse(dadosSalvos);
            } else {
                const listaNova = [];
                for(let i = 1; i <= TOTAL_FICHAS; i++) {
                    listaNova.push(criarFichaPadrao(i));
                }
                return listaNova;
            }
        }

        // Salva a lista completa atualizada de volta no navegador
        function salvarDadosGerais(dados) {
            localStorage.setItem(CHAVE_STORAGE, JSON.stringify(dados));
        }

        // Atualiza campos específicos e dispara o salvamento
        function atualizarCampo(index, campo, valor) {
            const dados = obterDadosGerais();
            dados[index][campo] = valor;
            salvarDadosGerais(dados);

            // Efeito visual dinâmico caso altere o status para Corrompido
            if (campo === 'status') {
                const card = document.getElementById(`card-${index}`);
                const selectElement = document.getElementById(`status-${index}`);
                
                if (valor === 'Corrompido') {
                    card.classList.add('corrompido-status');
                    selectElement.classList.add('status-corrompido');
                } else {
                    card.classList.remove('corrompido-status');
                    selectElement.classList.remove('status-corrompido');
                }
            }
        }

        // Controladores de Vida (Aumentar e Diminuir)
        // Controladores de Vida (Aumentar e Diminuir) - CORRIGIDO
        function alterarPV(index, quantidade) {
            const dados = obterDadosGerais();
            // Corrigido: usando a variável 'quantidade' corretamente
            let novoPV = parseInt(dados[index].pv) + quantidade; 
            
            if (novoPV < 0) novoPV = 0; // Impede vida negativa
            
            dados[index].pv = novoPV;
            salvarDadosGerais(dados);
            
            // Atualiza o número exibido na tela instantaneamente
            document.getElementById(`pv-val-${index}`).innerText = novoPV;
        }

        // Renderiza as 10 fichas na tela de forma limpa
        function renderizarPainel() {
            const dados = obterDadosGerais();
            const grid = document.getElementById('gridFichas');
            grid.innerHTML = ''; // Limpa conteúdo anterior

            dados.forEach((ficha, index) => {
                const isCorrompido = ficha.status === 'Corrompido';
                
                const cardHTML = `
                    <div class="ficha-card ${isCorrompido ? 'corrompido-status' : ''}" id="card-${index}">
                        <div class="ficha-header">
                            <input type="text" class="ficha-nome" value="${ficha.nome}" 
                                onchange="atualizarCampo(${index}, 'nome', this.value)" placeholder="Nome do Herói">
                            
                            <div class="pv-container">
                                <span class="pv-label">PV</span>
                                <button type="button" class="pv-btn" onclick="alterarPV(${index}, -1)">-</button>
                                <span class="pv-valor" id="pv-val-${index}">${ficha.pv}</span>
                                <button type="button" class="pv-btn" onclick="alterarPV(${index}, 1)">+</button>
                            </div>
                        </div>

                        <div class="status-container">
                            <label style="font-family: 'Cinzel'; font-size: 0.8rem; color: #bfae96;">Estado:</label>
                            <select id="status-${index}" class="status-select ${isCorrompido ? 'status-corrompido' : ''}" 
                                onchange="atualizarCampo(${index}, 'status', this.value)">
                                <option value="Normal" ${ficha.status === 'Normal' ? 'selected' : ''}>Normal</option>
                                <option value="Corrompido" ${ficha.status === 'Corrompido' ? 'selected' : ''}>Corrompido</option>
                            </select>
                        </div>

                        <div class="campo-texto">
                            <label>Inventário</label>
                            <textarea onchange="atualizarCampo(${index}, 'inventario', this.value)" 
                                placeholder="Itens, armas, relíquias...">${ficha.inventario}</textarea>
                        </div>

                        <div class="campo-texto">
                            <label>Histórico da Campanha</label>
                            <textarea onchange="atualizarCampo(${index}, 'historico', this.value)" 
                                placeholder="Notas do mestre, cicatrizes mentais...">${ficha.historico}</textarea>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Inicia o processo ao abrir a tela
        window.onload = renderizarPainel;
    </script>
</body>
</html>
