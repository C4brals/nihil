<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihil - A Última Campanha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./assets/ico.png" sizes="32x32">

    <link rel="icon" type="image/png" href="./assets/ico-grande.png" sizes="192x192">

    <link rel="apple-touch-icon" href="./assets/ico-ios.png">
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #050505;
            color: #dcd0c0;
            font-family: 'Lora', serif;
            margin: 0;
            padding: 0;
            /* Mudado para min-height e inserido paddings para respirar em telas pequenas */
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Empurra o rodapé nativamente para o fim */
            align-items: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.95)), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            overflow-y: auto; /* Permite rolar a tela se faltar espaço */
            padding: 60px 20px;
        }

        /* Moldura Medieval Sombria fixa para acompanhar o scroll se necessário */
        .moldura-tela {
            position: fixed;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 2px solid #4a0000; /* Linha de sangue */
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(139, 0, 0, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        /* Detalhes nos cantos da moldura */
        .moldura-tela::before, .moldura-tela::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #c5a059; /* Ouro envelhecido nos cantos */
        }
        .moldura-tela::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .moldura-tela::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        /* Container do Menu */
        .menu-container {
            text-align: center;
            z-index: 2;
            max-width: 600px;
            width: 100%;
            margin: auto 0; /* Centraliza verticalmente no espaço disponível */
            padding: 20px 0;
            animation: fadeIn 2s ease-in-out;
        }

        /* Título Principal */
        .titulo-jogo {
            font-family: 'Cinzel', serif;
            font-size: 3.0rem;
            color: #8b0000;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.7), 4px 4px 8px #000;
            margin-bottom: 5px;
            letter-spacing: 6px;
            font-weight: 900;
        }

        .subtitulo-jogo {
            font-family: 'Cinzel', serif;
            color: #c5a059;
            font-size: 1.1rem;
            letter-spacing: 4px;
            margin-top: 0;
            margin-bottom: 40px; /* Reduzido levemente para evitar empurrar demais */
            text-shadow: 2px 2px 4px #000;
        }

        /* Lista de Opções */
        .opcoes-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Botões Estilo RPG */
        .botao-menu {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: #bfae96;
            text-decoration: none;
            background: linear-gradient(to right, transparent, rgba(26, 0, 0, 0.4), transparent);
            padding: 12px 60px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 3px;
            transition: all 0.4s ease;
            position: relative;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Efeito de Brilho de Sangue e Magia ao passar o mouse */
        .botao-menu:hover {
            color: #ffffff;
            border-color: #8b0000;
            background: linear-gradient(to right, rgba(139, 0, 0, 0.2), rgba(74, 0, 0, 0.6), rgba(139, 0, 0, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5), inset 0 0 10px rgba(139, 0, 0, 0.4);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* Ícones rúnicos ocultos (❖) */
        .botao-menu::before, .botao-menu::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #8b0000;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .botao-menu::before { left: 20px; }
        .botao-menu::after { right: 20px; }

        .botao-menu:hover::before {
            opacity: 1;
            transform: translateY(-50%) translateX(5px);
        }
        .botao-menu:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(-5px);
        }

        /* Container do Botão de Voltar */
        .botoes-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            z-index: 2;
            width: 100%;
        }

        /* Botão Estilo RPG (Idêntico ao menu) */
        .botao-voltar {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #bfae96;
            text-decoration: none;
            background: linear-gradient(to right, transparent, rgba(26, 0, 0, 0.4), transparent);
            padding: 10px 40px;
            width: 100%;
            max-width: 300px;
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 3px;
            transition: all 0.4s ease;
            position: relative;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .botao-voltar:hover {
            color: #ffffff;
            border-color: #8b0000;
            background: linear-gradient(to right, rgba(139, 0, 0, 0.2), rgba(74, 0, 0, 0.6), rgba(139, 0, 0, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5), inset 0 0 10px rgba(139, 0, 0, 0.4);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        .botao-voltar::before, .botao-voltar::after {
            content: '❖';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #8b0000;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .botao-voltar::before { left: 15px; }
        .botao-voltar::after { right: 15px; }

        .botao-voltar:hover::before { opacity: 1; transform: translateY(-50%) translateX(5px); }
        .botao-voltar:hover::after { opacity: 1; transform: translateY(-50%) translateX(-5px); }

        @media (max-width: 600px) {
            .titulo-lore { font-size: 1.6rem; }
            .lore-container { padding: 20px; max-height: 65vh; }
            .botao-voltar { font-size: 0.9rem; padding: 8px 20px; }
        }

        /* Rodapé Ajustado */
        .footer-menu {
            font-size: 0.8rem;
            color: #444;
            letter-spacing: 2px;
            z-index: 2;
            text-align: center;
            margin-top: 30px; /* Garante distância mínima caso o menu chegue perto */
        }

        /* Animação suave ao abrir a página */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Media Query Otimizada para Celulares */
        @media (max-width: 480px) {
            body {
                padding: 50px 30px; /* Margem adequada para a moldura interna */
            }
            .titulo-jogo { 
                font-size: 1.8rem; /* Reduzido para não quebrar feio no celular */
                letter-spacing: 3px;
            }
            .subtitulo-jogo {
                font-size: 0.9rem;
                margin-bottom: 30px;
            }
            .botao-menu { 
                font-size: 1.1rem; 
                padding: 12px 20px; 
            }
            .botao-menu::before, .botao-menu::after {
                display: none; /* Oculta runas no celular para sobrar espaço para o texto */
            }
        }
    </style>
</head>
<body>

    <div class="moldura-tela"></div>

    <div class="menu-container">
        <h1 class="titulo-jogo">NIHIL, A ÚLTIMA CAMPANHA</h1>
        <p class="subtitulo-jogo">— Mapas a serem explorados —</p>

        <nav class="opcoes-menu">
            <a href="./ato1.html" class="botao-menu">ATO I</a>
            
        </nav>
    </div>

    <div class="botoes-container">
        <a href="./index.html" class="botao-voltar">Voltar ao Menu</a>
    </div>

    <div class="footer-menu">
        <p>© 2026 Desenvolvido por Augusto Cabral e Marlon Aciole. Todos os direitos reservados.</p>
    </div>

</body>
</html>
