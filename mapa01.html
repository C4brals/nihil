<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihil - Tabuleiro em Tempo Real</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #050505;
            color: #dcd0c0;
            font-family: 'Lora', serif;
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            padding: 40px 20px;
            overflow: hidden;
        }

        /* Moldura Medieval */
        .moldura-tela {
            position: fixed; top: 20px; bottom: 20px; left: 20px; right: 20px;
            border: 2px solid #4a0000;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(139, 0, 0, 0.2);
            pointer-events: none; z-index: 100;
        }
        .moldura-tela::before, .moldura-tela::after {
            content: ''; position: absolute; width: 30px; height: 30px; border: 4px solid #c5a059;
        }
        .moldura-tela::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .moldura-tela::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

        .gameplay-wrapper {
            display: grid; grid-template-columns: 340px 1fr; gap: 25px;
            width: 100%; max-width: 1400px; z-index: 2;
        }

        /* Painel Lateral */
        .painel-status {
            background: linear-gradient(to bottom, #0c0808, #140d0d);
            border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 4px; padding: 20px;
            display: flex; flex-direction: column; gap: 12px; max-height: 85vh; overflow-y: auto;
        }
        .painel-status::-webkit-scrollbar { width: 5px; }
        .painel-status::-webkit-scrollbar-track { background: #0c0808; }
        .painel-status::-webkit-scrollbar-thumb { background: #4a0000; border-radius: 2px; }

        .painel-status h2 {
            font-family: 'Cinzel', serif; font-size: 1.2rem; color: #c5a059;
            text-align: center; letter-spacing: 2px; border-bottom: 1px solid #4a0000;
            padding-bottom: 10px; margin-bottom: 5px;
        }

        .card-heroi {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: rgba(20, 15, 15, 0.6); 
            border: 1px solid rgba(139, 0, 0, 0.2);
            /* AUMENTADO: 10px em cima e embaixo para dar espaço vertical ao texto */
            padding: 10px 14px 10px 0px; 
            border-radius: 4px; 
            border-left: 4px solid var(--token-color);
            transition: all 0.3s ease;
            overflow: hidden; 
            /* AUMENTADO: De 70px para 85px (ou mais, se achar necessário) */
            min-height: 100px; 
        }

        .card-heroi.corrompido-estado {
            border-left-color: #4a154b !important;
            background: linear-gradient(to right, rgba(40, 10, 45, 0.6), rgba(20, 15, 15, 0.6));
            border-color: rgba(156, 65, 116, 0.4);
        }

        .info-heroi { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            height: 100%; 
            align-self: stretch; /* Faz este container esticar verticalmente */
        }

        .avatar-painel { 
            width: 55px; /* Largura fixa para o retângulo */
            height: 100%; /* Força a imagem a esticar de cima a baixo */
            align-self: stretch; 
            object-fit: cover; /* Faz a imagem cortar sem distorcer */
            border-right: 1px solid rgba(197, 160, 89, 0.2); /* Divisória sutil entre a foto e os textos */
            transition: all 0.3s;
        }
        
        .card-heroi.corrompido-estado .avatar-painel {
            border-right-color: #9c4174;
        }

        .textos-heroi { display: flex; flex-direction: column; }
        .nome-heroi { font-family: 'Cinzel', serif; font-size: 0.9rem; color: #bfae96; }
        .pv-container { font-size: 1.1rem; font-weight: bold; color: #8b0000; margin-top: 3px; }
        .pv-container span { color: #dcd0c0; }
        
        .controles-heroi { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .botoes-acao { display: flex; gap: 6px; align-items: center; }
        
        .btn-pv {
            background: rgba(40, 10, 10, 0.5); color: #bfae96; border: 1px solid rgba(197, 160, 89, 0.2);
            width: 28px; height: 28px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer;
        }
        .btn-pv:hover { color: #fff; border-color: #8b0000; background: #4a0000; }

        /* Container para alinhar as duas linhas (PV e AM) */
        .atributos-container { display: flex; flex-direction: column; gap: 6px; margin-top: 5px; }
        
        /* Container de PV (mantido igual) */
        .pv-container { font-size: 1.1rem; font-weight: bold; color: #8b0000; }
        .pv-container span { color: #dcd0c0; }
        
        /* Novo Container de AM (estilo idêntico ao PV, mas roxo) */
        .am-container { font-size: 1.1rem; font-weight: bold; color: #9c4174; font-family: 'Lora', serif; }
        .am-container span { color: #dcd0c0; }

        .controles-heroi { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        
        /* Container para agrupar os botões de cada atributo */
        /* Container para agrupar os botões de cada atributo */
        .linhas-botoes { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            width: 100%; /* Garante que o container ocupe todo o espaço disponível */
        }
        
        .botoes-acao { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            justify-content: flex-end; /* Alinha todos os botões de todas as linhas à direita */
        }
        
        .btn-pv {
            background: rgba(40, 10, 10, 0.5); color: #bfae96; border: 1px solid rgba(197, 160, 89, 0.2);
            width: 28px; height: 28px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer;
        }
        .btn-pv:hover { color: #fff; border-color: #8b0000; background: #4a0000; }

        /* Novo botão específico para o AM (muda a cor de hover para roxo) */
        .btn-am {
            background: rgba(30, 10, 30, 0.5); color: #bfae96; border: 1px solid rgba(197, 160, 89, 0.2);
            width: 28px; height: 28px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer;
        }
        .btn-am:hover { color: #fff; border-color: #9c4174; background: #4a154b; }

        /* Botão para Rolar Dado */
        .btn-dado {
            background: rgba(197, 160, 89, 0.1); color: #c5a059; border: 1px solid #c5a059;
            width: 28px; height: 28px; font-size: 0.9rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; border-radius: 3px; transition: all 0.2s;
        }
        .btn-dado:hover { background: #c5a059; color: #050505; box-shadow: 0 0 8px rgba(197, 160, 89, 0.4); }

        /* Botão para Rolar Dado */
        .btn-dado {
            background: rgba(197, 160, 89, 0.1); color: #c5a059; border: 1px solid #c5a059;
            width: 28px; height: 28px; font-size: 0.9rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center; border-radius: 3px; transition: all 0.2s;
        }
        .btn-dado:hover { background: #c5a059; color: #050505; box-shadow: 0 0 8px rgba(197, 160, 89, 0.4); }

        .btn-estado {
            font-family: 'Cinzel', serif; font-size: 0.65rem; padding: 2px 6px;
            background: rgba(20, 20, 20, 0.8); border: 1px solid #c5a059; color: #c5a059;
            cursor: pointer; letter-spacing: 1px; border-radius: 2px; transition: all 0.3s ease;
        }
        .btn-estado:hover { background: #c5a059; color: #050505; }
        .card-heroi.corrompido-estado .btn-estado { border-color: #9c4174; color: #9c4174; background: rgba(30, 10, 35, 0.8); }
        .card-heroi.corrompido-estado .btn-estado:hover { background: #9c4174; color: #fff; box-shadow: 0 0 8px #9c4174; }

        /* Container do Tabuleiro */
        .tabuleiro-container {
            position: relative; width: 100%; align-self: center;
            border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 4px; overflow: hidden;
        }
        .mapa-img { width: 100%; display: block; filter: brightness(0.85) contrast(1.05); }

        /* Tokens Redondos */
        .token-heroi {
            position: absolute; width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--token-color); box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            cursor: move; transform: translate(-50%, -50%); z-index: 10;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .token-heroi img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; pointer-events: none; }
        .token-heroi::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent;
            border-top: 9px solid var(--token-color); z-index: -1; transition: border-top-color 0.3s;
        }
        .token-heroi.corrompido-estado { border-color: #9c4174 !important; box-shadow: 0 0 12px #9c4174, 0 4px 10px rgba(0,0,0,0.9); }
        .token-heroi.corrompido-estado::after { border-top-color: #9c4174 !important; }

        /* ================= AREA DO DADO 3D (CSS PERSPECTIVE) ================= */
        .area-dados {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 200; display: flex; align-items: center; justify-content: center;
        }

        /* Banner de anúncio do rolador */
        .anuncio-rolagem {
            position: absolute; top: -100px; background: linear-gradient(to right, transparent, rgba(74, 0, 0, 0.95), rgba(12, 8, 8, 0.95), rgba(74, 0, 0, 0.95), transparent);
            border-top: 1px solid #c5a059; border-bottom: 1px solid #c5a059;
            padding: 12px 60px; font-family: 'Cinzel', serif; text-align: center;
            opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .anuncio-rolagem.ativo { top: 80px; opacity: 1; }
        .anuncio-rolagem h3 { color: #c5a059; font-size: 1.4rem; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .anuncio-rolagem p { font-size: 0.9rem; color: #bfae96; margin-top: 4px; }

        /* Cena do Dado */
        .cena-dado {
            width: 100px; height: 100px; perspective: 600px;
            opacity: 0; transform: scale(0.3); transition: opacity 0.3s, transform 0.3s;
        }
        .cena-dado.ativo { opacity: 1; transform: scale(1); }

        .dado3d {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 2.5s cubic-bezier(0.2, 0.8, 0.25, 1.15);
        }

        /* Faces do Dado - Agora usando a cor dinâmica do herói */
        .face {
            position: absolute; width: 100px; height: 100px; 
            background: radial-gradient(var(--cor-dado, #8b0000), #050505); /* Usa a cor do herói misturada com preto */
            border: 2px solid #c5a059; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: bold;
            color: #bfae96; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); backface-visibility: initial;
        }

        /* Posicionamento 3D das faces */
        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-6 { transform: rotateX(180deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-5 { transform: rotateY(-90deg) translateZ(50px); }
        .face-3 { transform: rotateX(90deg) translateZ(50px); }
        .face-4 { transform: rotateX(-90deg) translateZ(50px); }

        /* Quando o dado for Corrompido: mistura a cor do herói com roxo/preto e muda a borda */
        .cena-dado.dado-corrompido .face {
            background: radial-gradient(var(--cor-dado, #8b0000), #250530, #050505); 
            border-color: #9c4174; 
            color: #fff;
        }

        @media (max-width: 900px) {
            .gameplay-wrapper { grid-template-columns: 1fr; }
            .painel-status { max-height: 300px; }
        }
    </style>
</head>

                <div class="info-heroi">

                <div class="controles-heroi">
                    <div class="botoes-acao">
                        <button class="btn-dado" onclick="lancarDado('h10')">⚄</button>

        <!-- TABULEIRO INTERATIVO -->
        <main class="tabuleiro-container">
            <img src="./assets/mapas/mapa01.jpg" alt="Mapa Nihil" class="mapa-img">

            <!-- Tokens de Personagem (Imagens em sincronia com o painel) -->
            <div id="token-h1" class="token-heroi" style="--token-color: #8b0000; top: 46%; left: 16.5%;"><img src="./assets/herois/adepto.jpg?w=100" id="img-token-h1"></div>
            <div id="token-h2" class="token-heroi" style="--token-color: #2e4a2e; top: 46%; left: 18.5%;"><img src="./assets/herois/atroz.jpg?w=100" id="img-token-h2"></div>
            <div id="token-h3" class="token-heroi" style="--token-color: #2a4d6c; top: 46%; left: 20.5%;"><img src="./assets/herois/cacador.jpg?w=100" id="img-token-h3"></div>
            <div id="token-h4" class="token-heroi" style="--token-color: #7c5225; top: 49%; left: 16.5%;"><img src="./assets/herois/cleriga.jpg?w=100" id="img-token-h4"></div>
            <div id="token-h5" class="token-heroi" style="--token-color: #5b327a; top: 49%; left: 18.5%;"><img src="./assets/herois/combatente.jpg?w=100" id="img-token-h5"></div>
            <div id="token-h6" class="token-heroi" style="--token-color: #8c7623; top: 49%; left: 20.5%;"><img src="./assets/herois/druida.jpg?w=100" id="img-token-h6"></div>
            <div id="token-h7" class="token-heroi" style="--token-color: #3b7a7a; top: 52%; left: 16.5%;"><img src="./assets/herois/elementarista.jpg?w=100" id="img-token-h7"></div>
            <div id="token-h8" class="token-heroi" style="--token-color: #555555; top: 52%; left: 18.5%;"><img src="./assets/herois/guardiao.jpg?w=100" id="img-token-h8"></div>
            <div id="token-h9" class="token-heroi" style="--token-color: #9c4174; top: 52%; left: 20.5%;"><img src="./assets/herois/necromante.jpg?w=100" id="img-token-h9"></div>
            <div id="token-h10" class="token-heroi" style="--token-color: #9c4174; top: 55%; left: 16.5%;"><img src="./assets/herois/protetor.jpg?w=100" id="img-token-h10"></div>

    <!-- JAVASCRIPT: LÓGICA E CONEXÃO FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBNLypR4a5iIFRFykbkVdHq43k9u6zgOYM",
            authDomain: "nihil-a5022.firebaseapp.com",
            databaseURL: "https://nihil-a5022-default-rtdb.firebaseio.com",
            projectId: "nihil-a5022",
            storageBucket: "nihil-a5022.firebasestorage.app",
            messagingSenderId: "8709408405",
            appId: "1:8709408405:web:ca1789bbdb4be2ccc03d9c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ENVIAR MOVIMENTAÇÃO AO BANCO ---
        const tokens = document.querySelectorAll('.token-heroi');
        let tokenAtivo = null;
        let offsetX = 0; let offsetY = 0;

        tokens.forEach(token => {
            token.addEventListener('mousedown', (e) => {
                tokenAtivo = token;
                offsetX = e.clientX - token.getBoundingClientRect().left - (token.offsetWidth / 2);
                offsetY = e.clientY - token.getBoundingClientRect().top - (token.offsetHeight / 2);
                token.style.zIndex = '200';
            });
        });

        document.addEventListener('mousemove', (e) => {
            if (!tokenAtivo) return;
            const container = document.querySelector('.tabuleiro-container');
            const limite = container.getBoundingClientRect();

            let pctLeft = ((e.clientX - limite.left - offsetX) / limite.width) * 100;
            let pctTop = ((e.clientY - limite.top - offsetY) / limite.height) * 100;

            pctLeft = Math.max(0, Math.min(100, pctLeft));
            pctTop = Math.max(0, Math.min(100, pctTop));

            tokenAtivo.style.left = pctLeft + '%';
            tokenAtivo.style.top = pctTop + '%';

            set(ref(db, 'tokens/' + tokenAtivo.id), {
                left: pctLeft,
                top: pctTop
            });
        });

        document.addEventListener('mouseup', () => {
            if (tokenAtivo) { tokenAtivo.style.zIndex = '10'; tokenAtivo = null; }
        });

        // --- ENVIAR ENTRADA DE PV AO BANCO ---
        window.alterarPV = function(idHeroi, valor) {
            const display = document.getElementById(`pv-${idHeroi}`);
            if (display) {
                let pv = parseInt(display.innerText) + valor;
                if (pv < 0) pv = 0;
                set(ref(db, 'status/' + idHeroi + '/pv'), pv);
            }
        }
        // --- ENVIAR ENTRADA DE AM AO BANCO ---
        window.alterarAM = function(idHeroi, valor) {
            const display = document.getElementById(`am-${idHeroi}`);
            if (display) {
                let am = parseInt(display.innerText) + valor;
                if (am < 0) am = 0;
                if (am > 999) am = 999;
                set(ref(db, 'status/' + idHeroi + '/am'), am);
            }
        }

        // --- ALTERAR ESTADO (NORMAL / CORROMPIDO) NO BANCO ---
        window.alternarEstado = function(idHeroi) {
            const btn = document.getElementById(`btn-estado-${idHeroi}`);
            const novoEstado = (btn.innerText === "Normal") ? "Corrompido" : "Normal";
            set(ref(db, 'status/' + idHeroi + '/estado'), novoEstado);
        }

        window.lancarDado = function(idHeroi) {
            const card = document.getElementById(`card-${idHeroi}`);
            if (!card) return;

            // Busca o texto de dentro da tag que tem a classe 'nome-heroi' (ex: "Herói I")
            const elementoNome = card.querySelector('.nome-heroi');
            const nome = elementoNome ? elementoNome.innerText.trim() : "Herói";
            
            const estado = card.classList.contains('corrompido-estado') ? 'Corrompido' : 'Normal';
            
            // Captura a cor exata definida no estilo inline '--token-color' do card do herói
            const corHeroi = card.style.getPropertyValue('--token-color').trim();
            
            const resultado = Math.floor(Math.random() * 6) + 1;
            
            set(ref(db, 'rolagem_dado'), {
                idHeroi: idHeroi,
                nome: nome, // Agora vai enviar o texto correto do herói
                resultado: resultado,
                estado: estado,
                cor: corHeroi,
                timestamp: Date.now()
            });
        }

        // --- ANIMAÇÃO FÍSICA E ROTACIONAL DO DADO 3D COM BASE NO RESULTADO ---
        function animarDado3D(nome, resultado, estado, cor) {
            const cena = document.getElementById('cena-dado');
            const dado = document.getElementById('dado3d');
            const anuncio = document.getElementById('anuncio-rolagem');
            const anuncioNome = document.getElementById('anuncio-nome');
            
            // NOVO: Aplica a cor do herói na variável CSS do dado
            dado.style.setProperty('--cor-dado', cor);

            // Configurar tema (Corrompido ou Normal)
            if (estado === "Corrompido") {
                cena.classList.add('dado-corrompido');
            } else {
                cena.classList.remove('dado-corrompido');
            }

            // Exibir o Banner de anúncio na tela de todos
            anuncioNome.innerText = nome;
            anuncio.classList.add('ativo');
            cena.classList.add('ativo');

            // Rotações mapeadas para deixar a face final virada perfeitamente de frente
            const rotacoesFaces = {
                1: { x: 0, y: 0 },
                6: { x: 180, y: 0 },
                2: { x: 0, y: -90 },
                5: { x: 0, y: 90 },
                3: { x: -90, y: 0 },
                4: { x: 90, y: 0 }
            };

            const faceAlvo = rotacoesFaces[resultado];
            
            // Adicionamos voltas completas aleatórias (múltiplos de 360) para simular o dado rodopiando no ar
            const voltasX = (Math.floor(Math.random() * 3) + 3) * 360;
            const voltasY = (Math.floor(Math.random() * 3) + 3) * 360;

            const finalX = faceAlvo.x + voltasX;
            const finalY = faceAlvo.y + voltasY;

            // Aplica a animação tridimensional
            dado.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;

            // Remove os elementos da tela após 5 segundos
            setTimeout(() => {
                anuncio.classList.remove('ativo');
                cena.classList.remove('ativo');
                // Reseta a rotação suavemente em background
                setTimeout(() => { dado.style.transition = 'none'; dado.style.transform = 'none'; setTimeout(() => dado.style.transition = '', 50); }, 400);
            }, 5000);
        }

        function aplicarEstadoVisual(idHeroi, estado) {
            const card = document.getElementById(`card-${idHeroi}`);
            const token = document.getElementById(`token-${idHeroi}`);
            const avatarPainel = document.getElementById(`avatar-${idHeroi}`);
            const imgToken = document.getElementById(`img-token-${idHeroi}`);
            const btn = document.getElementById(`btn-estado-${idHeroi}`);

            if (!card) return;

            const urlNormal = card.getAttribute('data-img-normal');
            const urlCorrompida = card.getAttribute('data-img-corrompida');

            if (estado === "Corrompido") {
                card.classList.add('corrompido-estado');
                if (token) token.classList.add('corrompido-estado');
                if (avatarPainel) avatarPainel.src = urlCorrompida;
                if (imgToken) imgToken.src = urlCorrompida;
                if (btn) btn.innerText = "Corrompido";
            } else {
                card.classList.remove('corrompido-estado');
                if (token) token.classList.remove('corrompido-estado');
                if (avatarPainel) avatarPainel.src = urlNormal;
                if (imgToken) imgToken.src = urlNormal;
                if (btn) btn.innerText = "Normal";
            }
        }

        // --- ESCUTADORES EM TEMPO REAL ---
        onValue(ref(db, 'tokens/'), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                Object.keys(dados).forEach(id => {
                    const tokenNode = document.getElementById(id);
                    if (tokenNode && tokenNode !== tokenAtivo) {
                        tokenNode.style.left = dados[id].left + '%';
                        tokenNode.style.top = dados[id].top + '%';
                    }
                });
            }
        });

        onValue(ref(db, 'status/'), (snapshot) => {
            const dados = snapshot.val();
            if (dados) {
                Object.keys(dados).forEach(idHeroi => {
                    const display = document.getElementById(`pv-${idHeroi}`);
                    if (display && dados[idHeroi].pv !== undefined) {
                        display.innerText = dados[idHeroi].pv;
                    }
                    if (dados[idHeroi].estado !== undefined) {
                        aplicarEstadoVisual(idHeroi, dados[idHeroi].estado);
                    }
                    // --- ATUALIZAÇÃO DO AM EM TEMPO REAL ---
                    const displayAM = document.getElementById(`am-${idHeroi}`);
                    if (displayAM && dados[idHeroi].am !== undefined) {
                        displayAM.innerText = dados[idHeroi].am;
                    }
                });
            }
        });

        // Registra o momento exato em que a página foi aberta
        const momentoCarregamento = Date.now();

        onValue(ref(db, 'rolagem_dado'), (snapshot) => {
            const dados = snapshot.val();
            
            // Só roda a animação se o dado tiver sido gerado DEPOIS que a página abriu
            if (dados && dados.timestamp > momentoCarregamento) {
                // Garante que só roda uma vez por clique usando o timestamp
                if (!window.ultimoTimestampRolado || dados.timestamp > window.ultimoTimestampRolado) {
                    window.ultimoTimestampRolado = dados.timestamp;
                    animarDado3D(dados.nome, dados.resultado, dados.estado, dados.cor);
                }
            }
        });
    </script>
</body>
